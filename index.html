<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MR HASHUU | Ultimate Code Armor</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/javascript-obfuscator@4.1.0/dist/index.browser.js"></script>

    <style>
        :root {
            --bg: #010204;
            --surface: #0a0b0e;
            --card: rgba(17, 20, 24, 0.95);
            --primary: #ff0055;
            --secondary: #7000ff;
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --grad: linear-gradient(135deg, #ff0055 0%, #7000ff 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            min-height: 100vh; font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: var(--text-main); overflow-x: hidden;
        }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: 0; }

        .app-container { position: relative; z-index: 1; display: flex; flex-direction: column; gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; }

        /* Premium Header */
        header {
            background: var(--card); border: 1px solid var(--border); border-radius: 20px;
            padding: 15px 30px; display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(15px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .brand h1 { 
            font-weight: 800; font-size: 26px; letter-spacing: -1px;
            background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Redeem & Energy Bar */
        .dashboard-tools {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px;
            background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border);
        }
        .tool-box { display: flex; gap: 10px; align-items: center; }

        /* Workspace */
        .workspace { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 1024px) { .workspace { grid-template-columns: 1fr; } }

        .editor-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; display: flex; flex-direction: column; overflow: hidden; height: 400px; }
        .editor-header { padding: 12px 20px; background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 11px; font-weight: 700; color: var(--primary); text-transform: uppercase; }

        textarea { flex: 1; background: transparent; border: none; padding: 20px; color: #fff; font-family: 'Fira Code', monospace; font-size: 13px; resize: none; outline: none; line-height: 1.6; }

        /* Configuration Panel */
        .config-panel { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 25px; display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }

        .opt-box { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 15px; border-radius: 16px; transition: 0.3s; }
        .opt-box label { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 700; cursor: pointer; }
        input[type="checkbox"], select, .custom-input { accent-color: var(--primary); }
        .custom-input { background: rgba(0,0,0,0.4); border: 1px solid var(--border); padding: 12px; border-radius: 12px; color: #fff; width: 100%; outline: none; font-size: 13px; }

        /* Buttons */
        .btn { padding: 14px 25px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .btn-primary { background: var(--grad); color: white; box-shadow: 0 5px 15px rgba(255, 0, 85, 0.3); }
        .btn-secondary { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border); }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.2); }

        .console { background: #000; border-radius: 15px; padding: 15px; font-family: 'Fira Code', monospace; font-size: 12px; color: #ff0055; border: 1px solid var(--border); height: 90px; overflow-y: auto; }

        .loader-bar { position: fixed; top: 0; left: 0; height: 4px; background: var(--primary); width: 0%; z-index: 1000; transition: 0.4s; }
    </style>
</head>
<body>

<div id="particles-js"></div>
<div class="loader-bar" id="pBar"></div>

<div class="app-container">
    <header>
        <div class="brand">
            <h1>MR HASHUU <span style="font-weight: 300; font-size: 12px; color: #fff;">CODE ARMOR V6</span></h1>
        </div>
        <div style="display: flex; gap: 20px; align-items: center;">
            <div style="font-size: 14px; font-weight: 700;"><i class="fas fa-bolt" style="color: #fbbf24;"></i> <span id="energy">20</span> Energy</div>
            <button class="btn btn-secondary" style="padding: 8px 15px; font-size: 11px;" onclick="window.scrollTo(0, document.body.scrollHeight)">LOGS</button>
        </div>
    </header>

    <!-- Dashboard Redeem Tools -->
    <div class="dashboard-tools">
        <div class="tool-box">
            <input type="text" id="couponInput" class="custom-input" placeholder="Paste Redeem Code Here">
            <button class="btn btn-primary" style="padding: 10px 20px;" onclick="useCode()">Redeem</button>
        </div>
        <div class="tool-box">
            <input type="text" id="genResult" class="custom-input" placeholder="New Code will appear here" readonly>
            <button class="btn btn-secondary" style="padding: 10px 20px;" onclick="generateCode()">Generate (+50)</button>
        </div>
    </div>

    <div class="workspace">
        <div class="editor-card">
            <div class="editor-header"><span>Source JavaScript</span><span id="inSize">0B</span></div>
            <textarea id="inputCode" oninput="updateStats()" placeholder="// Paste your JS code here..."></textarea>
        </div>
        <div class="editor-card">
            <div class="editor-header"><span>Armored Output</span><span id="outSize">0B</span></div>
            <textarea id="outputCode" readonly placeholder="// Protected code..."></textarea>
        </div>
    </div>

    <div class="config-panel">
        <div class="opt-box">
            <label><input type="checkbox" id="cFlow" checked> Control Flow</label>
        </div>
        <div class="opt-box">
            <label><input type="checkbox" id="sArray" checked> String Array</label>
        </div>
        <div class="opt-box">
            <label><input type="checkbox" id="b64" checked> Base64 Encode</label>
        </div>
        <div class="opt-box">
            <label><input type="checkbox" id="math" checked> Math Logic</label>
        </div>
        <div class="opt-box">
            <label><input type="checkbox" id="anti" checked> Anti-Debug</label>
        </div>
        <div class="opt-box">
            <label><input type="checkbox" id="self" checked> Self Defending</label>
        </div>
        <div class="opt-box">
            <label>Domain Lock</label>
            <input type="text" id="domain" class="custom-input" placeholder="site.com">
        </div>
        <div class="opt-box">
            <label>Rename Mode</label>
            <select id="rename" class="custom-input">
                <option value="hexadecimal">Hexadecimal</option>
                <option value="mangled">Mangled</option>
            </select>
        </div>
    </div>

    <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;">
        <button class="btn btn-secondary" onclick="clearAll()">Reset</button>
        <button class="btn btn-primary" id="runBtn" onclick="armour()">
            <i class="fas fa-shield-alt"></i> ENCRYPT WITH MR HASHUU
        </button>
        <button class="btn btn-secondary" onclick="copy()"><i class="fas fa-copy"></i> Copy</button>
    </div>

    <div class="console" id="logs">
        > MR HASHUU Security System V6.0 [ONLINE]
    </div>
</div>

<script>
    // Particle Animation
    particlesJS("particles-js", { "particles": { "number": { "value": 60 }, "color": { "value": "#ff0055" }, "opacity": { "value": 0.2 }, "move": { "speed": 1.5 } } });

    let state = { energy: 20, activeCodes: new Set() };

    function log(msg, color = "#ff0055") {
        const l = document.getElementById('logs');
        l.innerHTML += `<div style="color:${color}">> [${new Date().toLocaleTimeString()}] ${msg}</div>`;
        l.scrollTop = l.scrollHeight;
    }

    // --- REDEEM SYSTEM ---
    function generateCode() {
        const code = 'HASH-' + Math.random().toString(36).substr(2, 6).toUpperCase();
        state.activeCodes.add(code);
        document.getElementById('genResult').value = code;
        log(`Redeem Code Created: ${code}`, "#7000ff");
        Swal.fire('Generated!', 'Code copied to result box. Share it for 50 credits.', 'success');
    }

    function useCode() {
        const val = document.getElementById('couponInput').value.trim();
        if(state.activeCodes.has(val)) {
            state.energy += 50;
            state.activeCodes.delete(val);
            document.getElementById('energy').innerText = state.energy;
            document.getElementById('couponInput').value = '';
            log('Redeem Success! +50 Energy added.', '#4ade80');
            Swal.fire('Success', '50 Energy added!', 'success');
        } else {
            Swal.fire('Invalid', 'Incorrect or expired code.', 'error');
        }
    }

    // --- ENCRYPTION ENGINE ---
    async function armour() {
        const input = document.getElementById('inputCode').value;
        if(!input) return;
        if(state.energy < 5) return Swal.fire('Out of Energy', 'Generate or use a code.', 'warning');

        const btn = document.getElementById('runBtn');
        const bar = document.getElementById('pBar');
        btn.disabled = true;
        bar.style.width = '40%';
        log('Starting MR HASHUU Core Engine...');

        setTimeout(() => {
            try {
                const res = JavaScriptObfuscator.obfuscate(input, {
                    compact: true,
                    controlFlowFlattening: document.getElementById('cFlow').checked,
                    stringArray: document.getElementById('sArray').checked,
                    stringArrayEncoding: document.getElementById('b64').checked ? ['base64'] : [],
                    numbersToExpressions: document.getElementById('math').checked,
                    debugProtection: document.getElementById('anti').checked,
                    selfDefending: document.getElementById('self').checked,
                    identifierNamesGenerator: document.getElementById('rename').value,
                    domainLock: document.getElementById('domain').value ? [document.getElementById('domain').value] : []
                }).getObfuscatedCode();

                document.getElementById('outputCode').value = res;
                state.energy -= 5;
                document.getElementById('energy').innerText = state.energy;
                updateStats();
                bar.style.width = '100%';
                log('Code Armored Successfully!', '#4ade80');
                setTimeout(() => bar.style.width = '0%', 500);
            } catch (e) {
                log('Error: ' + e.message, '#ef4444');
                Swal.fire('Error', 'Check your JS syntax.', 'error');
            } finally { btn.disabled = false; }
        }, 800);
    }

    function updateStats() {
        document.getElementById('inSize').innerText = (document.getElementById('inputCode').value.length / 1024).toFixed(2) + ' KB';
        document.getElementById('outSize').innerText = (document.getElementById('outputCode').value.length / 1024).toFixed(2) + ' KB';
    }

    function clearAll() { document.getElementById('inputCode').value = ''; document.getElementById('outputCode').value = ''; updateStats(); log('Workspace cleared.'); }
    function copy() { document.getElementById('outputCode').select(); document.execCommand('copy'); Swal.fire({title:'Copied!', icon:'success', toast:true, position:'top-end', showConfirmButton:false, timer:1000}); }
</script>
</body>
</html>
