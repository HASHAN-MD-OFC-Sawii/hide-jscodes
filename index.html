<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obfuscator Pro | Premium SaaS Interface</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/javascript-obfuscator@4.1.0/dist/index.browser.js"></script>

    <style>
        :root {
            --bg-deep: #05070a;
            --sidebar: #0a0d14;
            --card: rgba(16, 20, 28, 0.7);
            --accent: #00e5ff;
            --primary: #2979ff;
            --grad: linear-gradient(135deg, #2979ff 0%, #aa00ff 100%);
            --border: rgba(255, 255, 255, 0.05);
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100vh; width: 100vw; 
            overflow: hidden; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-deep);
            color: #fff;
        }

        #particles-js { position: fixed; width: 100%; height: 100%; z-index: 0; }

        .app-layout {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
        }

        /* Sidebar Navigation */
        nav {
            width: 80px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px 0;
            gap: 30px;
        }

        .nav-icon {
            width: 45px; height: 45px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: var(--text-dim);
            cursor: pointer; transition: 0.3s;
        }
        .nav-icon.active, .nav-icon:hover {
            background: var(--grad);
            color: white;
            box-shadow: 0 0 15px rgba(41, 121, 255, 0.4);
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
            background: radial-gradient(circle at top right, rgba(41, 121, 255, 0.05), transparent);
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 10px;
        }

        .user-stats { display: flex; gap: 20px; align-items: center; }
        .stat-badge {
            background: var(--card);
            padding: 8px 16px; border-radius: 50px;
            border: 1px solid var(--border);
            font-size: 14px; font-weight: 700;
        }

        /* Editor Section */
        .dashboard-grid {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 180px;
            gap: 20px;
            min-height: 0;
        }

        .card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: 0.3s;
        }
        .card:hover { border-color: rgba(255,255,255,0.1); }

        .card-header {
            padding: 15px 20px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }

        .card-header h3 { font-size: 12px; letter-spacing: 1px; color: var(--accent); text-transform: uppercase; }

        textarea {
            flex: 1; background: transparent; border: none; padding: 20px;
            color: #d1d5db; font-family: 'Fira Code', monospace;
            font-size: 13px; resize: none; outline: none; line-height: 1.6;
        }

        /* Console */
        .console-area {
            grid-column: span 2;
            padding: 15px;
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            overflow-y: auto;
            color: #4ade80;
        }

        /* Control Bar */
        .bottom-bar {
            background: var(--sidebar);
            padding: 15px 30px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
        }

        .config-options { display: flex; gap: 20px; font-size: 13px; color: var(--text-dim); }
        .config-options label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .config-options input { accent-color: var(--primary); }

        .btn {
            padding: 12px 24px; border-radius: 12px; border: none;
            cursor: pointer; font-weight: 700; font-size: 14px;
            display: flex; align-items: center; gap: 10px; transition: 0.3s;
        }
        .btn-primary { background: var(--grad); color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .btn-secondary { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border); }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.1); }

        .loader-line {
            position: fixed; top: 0; left: 0; height: 3px;
            width: 0%; background: var(--accent); box-shadow: 0 0 15px var(--accent);
            z-index: 9999; transition: 0.4s;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div id="particles-js"></div>
<div id="loader" class="loader-line"></div>

<div class="app-layout">
    <!-- Sidebar Navigation -->
    <nav>
        <div class="nav-icon active"><i class="fas fa-shield-halved"></i></div>
        <div class="nav-icon"><i class="fas fa-folder-open"></i></div>
        <div class="nav-icon" onclick="toggleAdmin()"><i class="fas fa-chart-pie"></i></div>
        <div style="flex: 1;"></div>
        <div class="nav-icon"><i class="fas fa-cog"></i></div>
    </nav>

    <main>
        <!-- Header -->
        <header>
            <div class="brand">
                <h2 style="font-weight: 800; font-size: 24px;">NEBULA<span style="color: var(--primary)">.PRO</span></h2>
                <p style="font-size: 12px; color: var(--text-dim);">Enterprise Grade Code Protection</p>
            </div>
            <div class="user-stats">
                <div class="stat-badge"><i class="fas fa-gem" style="color: #fbbf24;"></i> <span id="gems">20</span> Credits</div>
                <button class="btn btn-primary" style="padding: 8px 15px;" onclick="addGems()">Buy Credits</button>
            </div>
        </header>

        <!-- Main Workspace -->
        <div class="dashboard-grid" id="mainDash">
            <div class="card">
                <div class="card-header">
                    <h3>Source Input</h3>
                    <span id="inCount" style="font-size: 11px; color: var(--text-dim);">0 Characters</span>
                </div>
                <textarea id="inputCode" oninput="updateCounts()" placeholder="// Paste your JavaScript here..."></textarea>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3>Obfuscated Output</h3>
                    <span id="outCount" style="font-size: 11px; color: var(--text-dim);">0 Characters</span>
                </div>
                <textarea id="outputCode" readonly placeholder="// Protected code will appear here..."></textarea>
            </div>

            <div class="card console-area" id="terminal">
                <div style="color: var(--accent); margin-bottom: 5px;">[SYSTEM_LOG]: Engine Initialized v4.1.0</div>
                <div id="logs"></div>
            </div>
        </div>

        <!-- Admin View (Hidden) -->
        <div class="dashboard-grid hidden" id="adminDash">
            <div class="card" style="grid-column: span 2; align-items: center; justify-content: center;">
                <h1 style="font-size: 60px; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">ADMIN PANEL</h1>
                <p style="margin-top: 20px; font-size: 18px;">Total Conversions: <span id="totalCon" style="color: var(--accent);">0</span></p>
                <button class="btn btn-secondary" style="margin-top: 30px;" onclick="toggleAdmin()">Back to Editor</button>
            </div>
        </div>

        <!-- Bottom Controls -->
        <div class="bottom-bar">
            <div class="config-options">
                <label><input type="checkbox" id="c1" checked> Self-Defending</label>
                <label><input type="checkbox" id="c2" checked> Anti-Debug</label>
                <label><input type="checkbox" id="c3"> Dead Code</label>
                <input type="text" id="domain" placeholder="Lock to domain..." style="background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: #fff; padding: 5px 10px; border-radius: 8px; font-size: 12px; width: 150px;">
            </div>
            
            <div style="display: flex; gap: 15px;">
                <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
                <button class="btn btn-primary" id="runBtn" onclick="process()">
                    <i class="fas fa-bolt"></i> PROTECT CODE
                </button>
                <button class="btn btn-secondary" onclick="copy()"><i class="fas fa-copy"></i></button>
                <button class="btn btn-secondary" onclick="download()"><i class="fas fa-download"></i></button>
            </div>
        </div>
    </main>
</div>

<script>
    // Particle background
    particlesJS("particles-js", {
        "particles": { "number": { "value": 60 }, "color": { "value": "#2979ff" }, "opacity": { "value": 0.3 }, "size": { "value": 2 }, "move": { "speed": 1 } }
    });

    let state = { gems: 20, total: 0 };

    function log(msg, color = '#fff') {
        const logs = document.getElementById('logs');
        const entry = document.createElement('div');
        entry.style.color = color;
        entry.innerHTML = `> [${new Date().toLocaleTimeString()}] ${msg}`;
        logs.appendChild(entry);
        document.getElementById('terminal').scrollTop = document.getElementById('terminal').scrollHeight;
    }

    async function process() {
        const input = document.getElementById('inputCode').value;
        const dom = document.getElementById('domain').value;
        if(!input) return Swal.fire('Error', 'No input code found!', 'error');
        if(state.gems <= 0) return Swal.fire('Out of Credits', 'Please purchase more.', 'warning');

        const btn = document.getElementById('runBtn');
        const loader = document.getElementById('loader');
        
        btn.disabled = true;
        loader.style.width = '60%';
        log('Starting Obfuscation Engine...', 'var(--accent)');

        setTimeout(() => {
            try {
                const result = JavaScriptObfuscator.obfuscate(input, {
                    compact: true,
                    selfDefending: document.getElementById('c1').checked,
                    debugProtection: document.getElementById('c2').checked,
                    deadCodeInjection: document.getElementById('c3').checked,
                    domainLock: dom ? [dom] : [],
                    stringArray: true
                }).getObfuscatedCode();

                document.getElementById('outputCode').value = result;
                state.gems--;
                state.total++;
                document.getElementById('gems').innerText = state.gems;
                updateCounts();
                
                loader.style.width = '100%';
                log('Success! Your code is now secured.', '#4ade80');
                
                setTimeout(() => loader.style.width = '0%', 400);
            } catch (e) {
                log('Error: ' + e.message, '#ef4444');
                Swal.fire('Error', 'Invalid JavaScript syntax.', 'error');
            } finally {
                btn.disabled = false;
            }
        }, 1000);
    }

    function updateCounts() {
        document.getElementById('inCount').innerText = document.getElementById('inputCode').value.length + ' Characters';
        document.getElementById('outCount').innerText = document.getElementById('outputCode').value.length + ' Characters';
    }

    function clearAll() {
        document.getElementById('inputCode').value = '';
        document.getElementById('outputCode').value = '';
        log('Workspace cleared.', '#94a3b8');
        updateCounts();
    }

    function copy() {
        const out = document.getElementById('outputCode');
        out.select(); document.execCommand('copy');
        log('Copied to clipboard.', '#4ade80');
        Swal.fire({ icon: 'success', title: 'Copied!', toast: true, position: 'top-end', showConfirmButton: false, timer: 1500 });
    }

    function download() {
        const code = document.getElementById('outputCode').value;
        if(!code) return;
        const blob = new Blob([code], {type: 'text/javascript'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'nebula_protected.js';
        a.click();
        log('Security file exported.', 'var(--accent)');
    }

    function addGems() {
        state.gems += 50;
        document.getElementById('gems').innerText = state.gems;
        Swal.fire('Credits Added', '50 bonus credits added to your account.', 'success');
    }

    async function toggleAdmin() {
        const main = document.getElementById('mainDash');
        const admin = document.getElementById('adminDash');
        
        if(admin.classList.contains('hidden')) {
            const { value: pass } = await Swal.fire({ title: 'Admin Access', input: 'password', background: '#0a0d14', color: '#fff' });
            if(pass === 'admin123') {
                main.classList.add('hidden');
                admin.classList.remove('hidden');
                document.getElementById('totalCon').innerText = state.total;
                log('Admin access granted.', '#fbbf24');
            } else {
                Swal.fire('Denied', 'Incorrect password.', 'error');
            }
        } else {
            admin.classList.add('hidden');
            main.classList.remove('hidden');
        }
    }
</script>
</body>
</html>
