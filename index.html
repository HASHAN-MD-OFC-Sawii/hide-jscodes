<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Obfuscator Pro | Premium JS Protection</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- SweetAlert2 for beautiful alerts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #0f172a;
            --dark-2: #1e293b;
            --dark-3: #334155;
            --text: #e2e8f0;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --glow: rgba(99, 102, 241, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text);
            min-height: 100vh;
            padding: 15px;
            overflow-x: hidden;
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 10px var(--glow); } 50% { box-shadow: 0 0 20px var(--glow); } 100% { box-shadow: 0 0 10px var(--glow); } }

        .container { max-width: 1300px; margin: 0 auto; animation: fadeIn 0.6s ease-out; }

        /* Glassmorphism Header */
        .header {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .logo { display: flex; align-items: center; gap: 12px; }
        .logo i { 
            font-size: 32px; 
            background: linear-gradient(135deg, #818cf8, #c084fc); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(129, 140, 248, 0.6));
        }
        .logo h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }

        .gem-card {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            padding: 10px 20px;
            border-radius: 15px;
            min-width: 150px;
            position: relative;
            animation: pulseGlow 3s infinite;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .gem-count { font-size: 24px; font-weight: 800; text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .gem-label { font-size: 10px; text-transform: uppercase; text-align: center; font-weight: 700; opacity: 0.8; }

        /* Cards */
        .card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            transition: all 0.3s ease;
        }
        .card:hover { border-color: rgba(99, 102, 241, 0.3); }

        textarea {
            width: 100%;
            height: 300px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            color: #10b981; /* Green code color */
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            resize: none;
            transition: border 0.3s;
        }
        textarea:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(99, 102, 241, 0.2); }

        /* Buttons */
        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.1); }
        .btn:active { transform: translateY(0); }
        
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }
        .btn-secondary { background: var(--dark-3); color: white; border: 1px solid var(--border); }
        .btn-success { background: linear-gradient(135deg, #10b981, #059669); color: white; }

        /* Settings Grid */
        .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .checkbox-item {
            background: rgba(15, 23, 42, 0.5);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }
        .checkbox-item input { width: 18px; height: 18px; accent-color: var(--primary); }

        /* Helper Classes */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }
        
        .hidden { display: none !important; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--dark); }
        ::-webkit-scrollbar-thumb { background: var(--dark-3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <i class="fas fa-user-secret"></i>
                <div>
                    <h1>Obfuscator Pro</h1>
                    <span style="font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px;">Military Grade Security</span>
                </div>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="gem-card">
                    <div class="gem-label">Available Balance</div>
                    <div class="gem-count"><i class="fas fa-gem" style="font-size: 18px;"></i> <span id="gemCount">20</span></div>
                    <div id="timerDisplay" style="font-size: 10px; text-align: center; margin-top: 4px; display: none;">
                        <i class="fas fa-sync-alt fa-spin"></i> Next refill: <span id="timerText">00:00</span>
                    </div>
                </div>
                <button class="btn btn-success" onclick="buyGems()"><i class="fas fa-plus"></i> Buy</button>
                <button class="btn btn-secondary" onclick="toggleAdmin()"><i class="fas fa-shield-halved"></i></button>
            </div>
        </div>

        <div id="userPanel">
            <!-- Settings Card -->
            <div class="card" style="margin-bottom: 20px;">
                <h3 style="margin-bottom: 15px; font-size: 15px; display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-cog text-primary"></i> Protection Settings
                </h3>
                <div class="settings-grid">
                    <label class="checkbox-item"><input type="checkbox" id="compact" checked> <span>Compact Code</span></label>
                    <label class="checkbox-item"><input type="checkbox" id="controlFlow" checked> <span>Control Flow</span></label>
                    <label class="checkbox-item"><input type="checkbox" id="deadCode" checked> <span>Dead Code</span></label>
                    <label class="checkbox-item"><input type="checkbox" id="stringArray" checked> <span>String Encode</span></label>
                    <label class="checkbox-item"><input type="checkbox" id="selfDefending"> <span>Self Defend</span></label>
                    <label class="checkbox-item"><input type="checkbox" id="debugProtection"> <span>Anti-Debug</span></label>
                </div>
            </div>

            <!-- Code Area -->
            <div class="grid-2">
                <div class="card">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                        <span style="font-size: 13px; font-weight: 600;"><i class="fas fa-code"></i> Source JS</span>
                        <span id="inputStats" style="font-size: 11px; color: var(--text-dim);">0 chars</span>
                    </div>
                    <textarea id="inputCode" placeholder="// Paste your JavaScript code here..."></textarea>
                </div>
                <div class="card">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                        <span style="font-size: 13px; font-weight: 600;"><i class="fas fa-lock"></i> Protected JS</span>
                        <span id="outputStats" style="font-size: 11px; color: var(--text-dim);">0 chars</span>
                    </div>
                    <textarea id="outputCode" readonly placeholder="// Protected code will appear here..."></textarea>
                </div>
            </div>

            <!-- Actions -->
            <div style="display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;">
                <button class="btn btn-primary" id="obfuscateBtn" onclick="obfuscateCode()" style="padding: 15px 40px; font-size: 16px;">
                    <i class="fas fa-bolt"></i> OBFUSCATE NOW
                </button>
                <button class="btn btn-secondary" onclick="copyCode()"><i class="fas fa-copy"></i> Copy</button>
                <button class="btn btn-secondary" onclick="downloadCode()"><i class="fas fa-download"></i> Download</button>
                <button class="btn btn-secondary" style="color: var(--danger);" onclick="clearAll()"><i class="fas fa-trash"></i> Clear</button>
            </div>
        </div>

        <!-- Admin Panel (Simulated) -->
        <div id="adminPanel" class="card hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Admin Dashboard</h2>
                <button class="btn btn-secondary" onclick="logoutAdmin()">Exit</button>
            </div>
            <div class="settings-grid">
                <div class="card" style="text-align: center;">
                    <div style="font-size: 24px; font-weight: 800; color: var(--primary);" id="statUses">0</div>
                    <div style="font-size: 12px; color: var(--text-dim);">Total Uses</div>
                </div>
                <div class="card" style="text-align: center;">
                    <div style="font-size: 24px; font-weight: 800; color: var(--success);" id="statSales">$0.00</div>
                    <div style="font-size: 12px; color: var(--text-dim);">Total Revenue</div>
                </div>
            </div>
            <button class="btn btn-primary" style="width: 100%; margin-top: 20px;" onclick="addAdminGems()">Add 100 Bonus Gems</button>
        </div>

        <div style="text-align: center; margin-top: 40px; color: var(--text-dim); font-size: 12px;">
            <p>© 2026 Obfuscator Pro Engine v4.1 | Secure Client-Side Encryption</p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/javascript-obfuscator@4.1.0/dist/index.browser.js"></script>
    
    <script>
        // Storage Keys
        const KEY_GEMS = 'pro_gems';
        const KEY_REFILL = 'pro_refill';
        const KEY_STATS = 'pro_stats';

        let state = {
            gems: parseInt(localStorage.getItem(KEY_GEMS)) || 20,
            lastRefill: localStorage.getItem(KEY_REFILL) || new Date().toISOString(),
            totalUses: parseInt(localStorage.getItem(KEY_STATS)) || 0
        };

        // UI Initialization
        function init() {
            updateUI();
            startTimer();
            
            // Input char counter
            document.getElementById('inputCode').addEventListener('input', e => {
                document.getElementById('inputStats').textContent = `${e.target.value.length} chars`;
            });
        }

        function updateUI() {
            document.getElementById('gemCount').textContent = state.gems;
            localStorage.setItem(KEY_GEMS, state.gems);
            
            const btn = document.getElementById('obfuscateBtn');
            if(state.gems <= 0) {
                btn.style.opacity = '0.5';
                btn.innerHTML = '<i class="fas fa-lock"></i> NO GEMS LEFT';
            } else {
                btn.style.opacity = '1';
                btn.innerHTML = '<i class="fas fa-bolt"></i> OBFUSCATE NOW';
            }
        }

        function startTimer() {
            setInterval(() => {
                const now = new Date();
                const last = new Date(state.lastRefill);
                const diff = now - last;
                const tenHours = 10 * 60 * 60 * 1000;

                if (state.gems < 20) {
                    document.getElementById('timerDisplay').style.display = 'block';
                    const remaining = tenHours - diff;
                    
                    if (remaining <= 0) {
                        state.gems = Math.min(20, state.gems + 10);
                        state.lastRefill = new Date().toISOString();
                        localStorage.setItem(KEY_REFILL, state.lastRefill);
                        updateUI();
                        Swal.fire({ title: 'Refilled!', text: 'You got 10 bonus gems!', icon: 'success', toast: true, position: 'top-end', showConfirmButton: false, timer: 3000 });
                    } else {
                        const h = Math.floor(remaining / 3600000);
                        const m = Math.floor((remaining % 3600000) / 60000);
                        document.getElementById('timerText').textContent = `${h}h ${m}m`;
                    }
                } else {
                    document.getElementById('timerDisplay').style.display = 'none';
                }
            }, 1000);
        }

        // Obfuscation Logic
        async function obfuscateCode() {
            const input = document.getElementById('inputCode').value.trim();
            
            if (!input) {
                Swal.fire({ icon: 'error', title: 'Empty Code', text: 'Please paste some JavaScript first!', background: '#1e293b', color: '#fff' });
                return;
            }

            if (state.gems <= 0) {
                Swal.fire({ icon: 'warning', title: 'Gems Empty', text: 'You need gems to protect code.', showCancelButton: true, confirmButtonText: 'Buy Gems' }).then(res => {
                    if(res.isConfirmed) buyGems();
                });
                return;
            }

            // Show Loading
            Swal.fire({
                title: 'Encrypting...',
                html: 'Applying military-grade protection',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            setTimeout(() => {
                try {
                    const result = JavaScriptObfuscator.obfuscate(input, {
                        compact: document.getElementById('compact').checked,
                        controlFlowFlattening: document.getElementById('controlFlow').checked,
                        deadCodeInjection: document.getElementById('deadCode').checked,
                        stringArray: document.getElementById('stringArray').checked,
                        selfDefending: document.getElementById('selfDefending').checked,
                        debugProtection: document.getElementById('debugProtection').checked,
                    }).getObfuscatedCode();

                    document.getElementById('outputCode').value = result;
                    document.getElementById('outputStats').textContent = `${result.length} chars`;
                    
                    state.gems--;
                    state.totalUses++;
                    localStorage.setItem(KEY_STATS, state.totalUses);
                    updateUI();
                    
                    Swal.fire({ icon: 'success', title: 'Protected!', text: 'Code encrypted successfully!', timer: 2000, showConfirmButton: false, background: '#1e293b', color: '#fff' });
                } catch (e) {
                    Swal.fire({ icon: 'error', title: 'JS Error', text: e.message });
                }
            }, 800);
        }

        // Helpers
        function copyCode() {
            const out = document.getElementById('outputCode');
            if(!out.value) return;
            out.select();
            document.execCommand('copy');
            Swal.fire({ icon: 'success', title: 'Copied to clipboard', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000 });
        }

        function downloadCode() {
            const out = document.getElementById('outputCode').value;
            if(!out) return;
            const blob = new Blob([out], {type: 'text/javascript'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `protected_${Date.now()}.js`;
            a.click();
        }

        function clearAll() {
            document.getElementById('inputCode').value = '';
            document.getElementById('outputCode').value = '';
            updateUI();
        }

        function buyGems() {
            Swal.fire({
                title: 'Refill Gems',
                text: 'Purchase 100 Premium Gems for $4.99?',
                icon: 'info',
                showCancelButton: true,
                confirmButtonText: 'Buy Now (Demo)',
                background: '#1e293b',
                color: '#fff'
            }).then(result => {
                if(result.isConfirmed) {
                    state.gems += 100;
                    updateUI();
                    Swal.fire('Success', '100 Gems added to your account!', 'success');
                }
            });
        }

        // Admin Panel Logic
        async function toggleAdmin() {
            const { value: password } = await Swal.fire({
                title: 'Admin Access',
                input: 'password',
                inputPlaceholder: 'Enter admin password',
                background: '#1e293b',
                color: '#fff'
            });

            if (password === 'admin123') {
                document.getElementById('userPanel').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                document.getElementById('statUses').textContent = state.totalUses;
            } else if(password) {
                Swal.fire('Error', 'Wrong password!', 'error');
            }
        }

        function logoutAdmin() {
            document.getElementById('adminPanel').classList.add('hidden');
            document.getElementById('userPanel').classList.remove('hidden');
        }

        function addAdminGems() {
            state.gems += 100;
            updateUI();
            Swal.fire('Admin', '100 Bonus Gems Added', 'success');
        }

        window.onload = init;
    </script>
</body>
</html>
